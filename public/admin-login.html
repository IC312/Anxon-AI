<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes – Quản trị viên</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--surface:#16161a;--border:#2a2a32;--acc:#e8ff5a;--acc-dim:rgba(232,255,90,.12);--txt:#e8e8f0;--muted:#55556a;--err:#f87171}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:380px}
  .logo-area{text-align:center}
  .logo-mark{width:48px;height:48px;background:var(--acc);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#0d0d0f;font-family:'DM Mono',monospace;margin:0 auto 12px}
  .logo-title{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
  .logo-sub{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:20px;font-size:.68rem;color:#f87171;font-family:'DM Mono',monospace;margin-top:8px}
  .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#f87171}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  label{font-size:.73rem;color:var(--muted);letter-spacing:.02em}
  input{background:#0d0d0f;border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--txt);font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;width:100%}
  input:focus{border-color:rgba(248,113,113,.5)}
  input::placeholder{color:var(--muted)}
  .btn{width:100%;padding:12px;border-radius:10px;border:none;background:#f87171;color:#fff;font-weight:700;font-size:.88rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:4px}
  .btn:hover:not(:disabled){background:#f95b5b;transform:translateY(-1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .msg{font-size:.78rem;padding:9px 12px;border-radius:8px;text-align:center;margin-top:10px;display:none}
  .msg.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);color:var(--err);display:block}
  .footer-note{font-size:.68rem;color:var(--muted);text-align:center;font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-mark">H3</div>
    <div class="logo-title">Hermes Chat</div>
    <div class="logo-sub">Cổng quản trị hệ thống</div>
    <div class="badge">Khu vực dành riêng cho Admin</div>
  </div>

  <div class="card">
    <form onsubmit="doLogin(event)">
      <div class="field">
        <label>Tên đăng nhập Admin</label>
        <input type="text" id="uname" placeholder="Nhập tên đăng nhập" required autocomplete="username">
      </div>
      <div class="field">
        <label>Mật khẩu</label>
        <input type="password" id="pw" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="msg" id="msg"></div>
      <button class="btn" type="submit" id="btn">Đăng nhập quản trị</button>
    </form>
  </div>

  <div class="footer-note">Trang này không được công khai · Chỉ dành cho quản trị viên</div>
</div>

<script>
  // Nếu đã đăng nhập với role admin → vào thẳng dashboard
  const token = localStorage.getItem('hc_token');
  const role  = localStorage.getItem('hc_role');
  if (token && role === 'admin') location.href = '/admin.html';

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    btn.disabled = true; btn.textContent = 'Đang xác thực…'; msg.className = 'msg';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ cccd: document.getElementById('uname').value.trim(), password: document.getElementById('pw').value })
      });
      const data = await res.json();
      if (!res.ok) { msg.textContent = data.error; msg.className = 'msg err'; return; }
      if (data.role !== 'admin') { msg.textContent = 'Tài khoản này không có quyền quản trị'; msg.className = 'msg err'; return; }
      ['hc_token','hc_role','hc_fullName','hc_className','hc_gender','hc_dob','hc_mustChangePw'].forEach(k => localStorage.removeItem(k));
      localStorage.setItem('hc_token',    data.token);
      localStorage.setItem('hc_role',     data.role);
      localStorage.setItem('hc_fullName', data.fullName);
      location.href = '/admin.html';
    } catch { msg.textContent = 'Lỗi kết nối server'; msg.className = 'msg err'; }
    finally { btn.disabled = false; btn.textContent = 'Đăng nhập quản trị'; }
  }
</script>
</body>
</html>
