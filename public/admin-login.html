<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axon AI — Quản trị</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050508;--surface:#0d0d14;--surface2:#12121e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--accent:#f87171;--accent2:#fb923c;--accent-soft:rgba(248,113,113,0.12);--text:#e8e8f0;--muted:#6b6b80;--muted2:#9090a8;--danger:#f87171;--success:#34d399}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb-1{position:absolute;width:500px;height:500px;background:radial-gradient(circle,#f87171,transparent);border-radius:50%;filter:blur(80px);opacity:.05;top:-150px;right:-100px;animation:orb1 20s ease-in-out infinite}
.bg-orb-2{position:absolute;width:400px;height:400px;background:radial-gradient(circle,#fb923c,transparent);border-radius:50%;filter:blur(80px);opacity:.05;bottom:-100px;left:-80px;animation:orb2 25s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,60px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-50px)}}
.card{position:relative;z-index:10;background:var(--surface);border:1px solid rgba(248,113,113,.2);border-radius:24px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(248,113,113,.05);animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:20px;font-size:.72rem;font-weight:700;color:#fca5a5;letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px}
.badge-dot{width:6px;height:6px;background:#f87171;border-radius:50%;box-shadow:0 0 6px #f87171;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.03em;color:white}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#f87171,#fb923c);border-radius:10px;display:flex;align-items:center;justify-content:center}
.sub{font-size:.82rem;color:var(--muted);margin-bottom:28px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.field label{font-size:.8rem;font-weight:600;color:var(--muted2)}
.s-input{background:var(--surface2);border:1px solid rgba(248,113,113,.2);border-radius:11px;padding:11px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.s-input:focus{border-color:rgba(248,113,113,.5);box-shadow:0 0 0 3px rgba(248,113,113,.08)}
.s-input::placeholder{color:var(--muted)}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#f87171,#fb923c);border:none;border-radius:11px;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:6px}
.btn-primary:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.msg{font-size:.8rem;padding:10px 13px;border-radius:9px;margin-top:12px;display:none;align-items:center;gap:8px}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5;display:flex}
.note{font-size:.74rem;color:var(--muted);text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
@media(max-width:480px){.card{padding:28px 22px;border-radius:18px;margin:12px}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="bg-orb-1"></div><div class="bg-orb-2"></div></div>
<div class="card">
  <div class="badge"><span class="badge-dot"></span>Khu vực quản trị</div>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    Axon Admin
  </div>
  <div class="sub">Cổng quản trị hệ thống · Chỉ dành cho quản trị viên</div>

  <form onsubmit="doLogin(event)">
    <div class="field">
      <label>Tên đăng nhập</label>
      <input class="s-input" type="text" id="uname" placeholder="admin" required autocomplete="username">
    </div>
    <div class="field">
      <label>Mật khẩu</label>
      <input class="s-input" type="password" id="pw" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <div class="msg" id="msg"></div>
    <button class="btn-primary" type="submit" id="btn">Đăng nhập quản trị</button>
  </form>

  <div class="note">URL này không được công khai · Không chia sẻ với học sinh</div>
</div>

<script>
const t=localStorage.getItem('hc_token'),r=localStorage.getItem('hc_role');
if(t&&r==='admin')location.href='/admin.html';
async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('btn'),msg=document.getElementById('msg');
  btn.disabled=true;btn.textContent='Đang xác thực…';msg.className='msg';
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cccd:document.getElementById('uname').value.trim(),password:document.getElementById('pw').value})});
    const data=await res.json();
    if(!res.ok){msg.textContent='⚠ '+data.error;msg.className='msg err';return;}
    if(data.role!=='admin'){msg.textContent='⚠ Tài khoản này không có quyền quản trị';msg.className='msg err';return;}
    ['hc_token','hc_role','hc_fullName','hc_className','hc_gender','hc_dob','hc_mustChangePw'].forEach(k=>localStorage.removeItem(k));
    localStorage.setItem('hc_token',data.token);
    localStorage.setItem('hc_role',data.role);
    localStorage.setItem('hc_fullName',data.fullName);
    location.href='/admin.html';
  }catch{msg.textContent='⚠ Lỗi kết nối server';msg.className='msg err';}
  finally{btn.disabled=false;btn.textContent='Đăng nhập quản trị';}
}
</script>
</body>
</html>
