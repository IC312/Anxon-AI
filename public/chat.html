<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--surface:#16161a;--border:#2a2a32;--acc:#e8ff5a;--acc-dim:rgba(232,255,90,.12);--txt:#e8e8f0;--muted:#55556a;--r:10px}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);height:100dvh;display:flex;overflow:hidden}

  /* ── Sidebar ── */
  #sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100dvh}
  .sb-head{padding:16px;border-bottom:1px solid var(--border)}
  .logo{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .logo-mark{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#0d0d0f;font-family:'DM Mono',monospace;flex-shrink:0}
  .logo-txt{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
  .user-info{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--acc-dim);border:1px solid rgba(232,255,90,.15);border-radius:8px}
  .av-sm{width:28px;height:28px;border-radius:7px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#0d0d0f;font-family:'DM Mono',monospace;flex-shrink:0}
  .user-detail{flex:1;min-width:0}
  .user-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .user-class{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace}
  .new-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;margin-top:12px;border:1px dashed var(--border);border-radius:9px;background:none;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
  .new-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
  .conv-list{flex:1;overflow-y:auto;padding:8px}
  .conv-list::-webkit-scrollbar{width:3px}
  .conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .conv-item{padding:9px 11px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;gap:6px}
  .conv-item:hover{background:rgba(255,255,255,.04)}
  .conv-item.active{background:var(--acc-dim);border:1px solid rgba(232,255,90,.2)}
  .conv-title{font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .conv-del{opacity:0;font-size:.7rem;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .15s;flex-shrink:0}
  .conv-item:hover .conv-del{opacity:1}
  .conv-del:hover{color:#f87171;background:rgba(248,113,113,.1)}
  .sb-foot{padding:12px;border-top:1px solid var(--border)}
  .logout-btn{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
  .logout-btn:hover{border-color:#f87171;color:#f87171;background:rgba(248,113,113,.06)}

  /* ── Main ── */
  #main{flex:1;display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
  .conv-header-title{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;flex-shrink:0}
  .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  #chat::-webkit-scrollbar{width:3px}
  #chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  #welcome{margin:auto;text-align:center;max-width:380px}
  #welcome h2{font-size:1.6rem;font-weight:700;letter-spacing:-.03em;margin-bottom:8px;line-height:1.2}
  #welcome h2 span{color:var(--acc)}
  #welcome p{color:var(--muted);font-size:.82rem;line-height:1.8}
  .msg{display:flex;gap:10px;max-width:780px;animation:fadeUp .2s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.ai{align-self:flex-start}
  .av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0;margin-top:2px;font-family:'DM Mono',monospace}
  .msg.user .av{background:var(--acc);color:#0d0d0f}
  .msg.ai .av{background:var(--surface);border:1px solid var(--border);color:var(--acc)}
  .bub{padding:10px 14px;border-radius:var(--r);font-size:.85rem;line-height:1.75;max-width:calc(100% - 40px);word-break:break-word}
  .msg.user .bub{background:var(--surface);border:1px solid rgba(232,255,90,.15);border-bottom-right-radius:3px;white-space:pre-wrap}
  .msg.ai .bub{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px}
  .bub pre{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:7px;padding:12px;overflow-x:auto;margin:8px 0;font-size:.77em}
  .bub code{font-family:'DM Mono',monospace;font-size:.82em;color:var(--acc);background:rgba(232,255,90,.08);padding:1px 5px;border-radius:3px}
  .bub pre code{background:none;color:var(--txt);padding:0}
  .typing-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--muted);margin:0 2px;animation:bounce .9s ease-in-out infinite}
  .typing-dots span:nth-child(2){animation-delay:.15s}
  .typing-dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  .err-msg{align-self:center;padding:10px 16px;border-radius:var(--r);border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.06);color:#f87171;font-size:.8rem}
  .input-area{padding:16px 24px 20px;border-top:1px solid var(--border);flex-shrink:0}
  .input-row{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px 8px 8px 16px;transition:border-color .15s}
  .input-row:focus-within{border-color:rgba(232,255,90,.4)}
  textarea{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:.88rem;line-height:1.6;resize:none;max-height:140px;min-height:24px;padding:2px 0}
  textarea::placeholder{color:var(--muted)}
  .send-btn{width:36px;height:36px;border-radius:9px;border:none;background:var(--acc);color:#0d0d0f;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .send-btn:hover:not(:disabled){background:#f0ff6e;transform:scale(1.05)}
  .send-btn:disabled{opacity:.35;cursor:not-allowed}
  .send-btn svg{width:16px;height:16px}
  .input-footer{display:flex;justify-content:flex-end;margin-top:8px;padding:0 4px}
  .model-badge{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <div class="sb-head">
    <div class="logo">
      <div class="logo-mark">H3</div>
      <span class="logo-txt">Hermes Chat</span>
    </div>
    <div class="user-info">
      <div class="av-sm" id="sb-av">U</div>
      <div class="user-detail">
        <div class="user-name" id="sb-name">Học sinh</div>
        <div class="user-class" id="sb-class">Lớp —</div>
      </div>
    </div>
    <button class="new-btn" onclick="newConversation()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Hội thoại mới
    </button>
  </div>
  <div class="conv-list" id="conv-list"></div>
  <div class="sb-foot">
    <button class="logout-btn" onclick="logout()">Đăng xuất</button>
  </div>
</div>

<!-- ── Main chat ── -->
<div id="main">
  <header>
    <span class="conv-header-title" id="conv-header">Hermes Chat</span>
    <div class="status-pill"><span class="dot"></span>online</div>
  </header>

  <div id="chat">
    <div id="welcome">
      <h2>Xin chào,<br><span id="welcome-name">bạn</span>!</h2>
      <p>Tạo hội thoại mới hoặc chọn hội thoại từ danh sách bên trái để bắt đầu.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="inp" placeholder="Nhắn tin…" rows="1"></textarea>
      <button class="send-btn" id="btn-send" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="model-badge">Hermes-3 · Llama 3.1 8B</span>
    </div>
  </div>
</div>

<script>
const API_PROXY = 'https://aitest-production-52ee.up.railway.app/v1/chat/completions';
const token     = localStorage.getItem('hc_token');
const fullName  = localStorage.getItem('hc_fullName') || 'Học sinh';
const className = localStorage.getItem('hc_className') || '';

if (!token) location.href = '/login.html';

// ── UI setup ─────────────────────────────────────────
document.getElementById('sb-av').textContent   = fullName.charAt(0).toUpperCase();
document.getElementById('sb-name').textContent  = fullName;
document.getElementById('sb-class').textContent = className ? 'Lớp ' + className : 'Học sinh';
document.getElementById('welcome-name').textContent = fullName.split(' ').pop();

const chatEl  = document.getElementById('chat');
const inp     = document.getElementById('inp');
const btnSend = document.getElementById('btn-send');

let currentConvId = null;
let chatHistory   = [];
let busy          = false;

// ── Auth header ───────────────────────────────────────
const authHeader = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token });

// ── Conversations ─────────────────────────────────────
async function loadConversations() {
  const res  = await fetch('/api/chat/conversations', { headers: authHeader() });
  const list = await res.json();
  renderConvList(list);
  return list;
}

function renderConvList(list) {
  const el = document.getElementById('conv-list');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = '<div style="padding:16px;font-size:.78rem;color:var(--muted);text-align:center">Chưa có hội thoại nào</div>';
    return;
  }
  list.forEach(c => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (c._id === currentConvId ? ' active' : '');
    item.innerHTML = `<span class="conv-title">${esc(c.title)}</span><button class="conv-del" onclick="deleteConv(event,'${c._id}')">✕</button>`;
    item.addEventListener('click', () => selectConversation(c._id, c.title));
    el.appendChild(item);
  });
}

async function selectConversation(id, title) {
  currentConvId = id;
  chatHistory   = [];
  btnSend.disabled = false;
  document.getElementById('conv-header').textContent = title;
  chatEl.innerHTML = '';
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');

  const res  = await fetch(`/api/chat/conversations/${id}/messages`, { headers: authHeader() });
  const msgs = await res.json();
  if (!msgs.length) {
    chatEl.innerHTML = '<div id="welcome" style="margin:auto;text-align:center;color:var(--muted);font-size:.85rem">Hãy bắt đầu cuộc trò chuyện!</div>';
  } else {
    msgs.forEach(m => { addBubble(m.role === 'user' ? 'user' : 'ai', m.role === 'user' ? esc(m.content).replace(/\n/g,'<br>') : renderMd(m.content)); });
    chatHistory = msgs.map(m => ({ role: m.role, content: m.content }));
  }
  await loadConversations();
  // Re-highlight active
  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.conv-title')?.textContent === document.getElementById('conv-header').textContent);
  });
}

async function newConversation() {
  const res  = await fetch('/api/chat/conversations', { method: 'POST', headers: authHeader(), body: JSON.stringify({ title: 'Hội thoại mới' }) });
  const conv = await res.json();
  currentConvId = conv._id;
  chatHistory   = [];
  btnSend.disabled = false;
  document.getElementById('conv-header').textContent = 'Hội thoại mới';
  chatEl.innerHTML = '<div style="margin:auto;text-align:center;color:var(--muted);font-size:.85rem">Hãy bắt đầu cuộc trò chuyện!</div>';
  await loadConversations();
}

async function deleteConv(e, id) {
  e.stopPropagation();
  if (!confirm('Xoá hội thoại này?')) return;
  await fetch(`/api/chat/conversations/${id}`, { method: 'DELETE', headers: authHeader() });
  if (currentConvId === id) {
    currentConvId = null;
    chatHistory   = [];
    btnSend.disabled = true;
    chatEl.innerHTML = '<div id="welcome" style="margin:auto;text-align:center"><h2 style="font-size:1.4rem;font-weight:700;letter-spacing:-.02em">Xin chào, <span style="color:var(--acc)">' + esc(fullName.split(' ').pop()) + '</span>!</h2><p style="color:var(--muted);font-size:.82rem;margin-top:8px">Tạo hội thoại mới để bắt đầu.</p></div>';
    document.getElementById('conv-header').textContent = 'Hermes Chat';
  }
  await loadConversations();
}

// ── Sending ───────────────────────────────────────────
inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,140)+'px'; });
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
btnSend.addEventListener('click', send);

async function send() {
  const text = inp.value.trim();
  if (!text || busy || !currentConvId) return;
  busy = true;
  btnSend.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';

  // Remove welcome
  document.getElementById('welcome')?.remove();
  document.querySelector('[style*="Hãy bắt đầu"]')?.remove();

  chatHistory.push({ role: 'user', content: text });
  addBubble('user', esc(text).replace(/\n/g,'<br>'));

  // Save user message
  fetch(`/api/chat/conversations/${currentConvId}/messages`, {
    method: 'POST', headers: authHeader(),
    body: JSON.stringify({ role: 'user', content: text })
  });

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'msg ai'; typing.id = 'typing';
  typing.innerHTML = '<div class="av">AI</div><div class="bub"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(typing);
  chatEl.scrollTop = chatEl.scrollHeight;

  try {
    const res = await fetch(API_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: 'You are Hermes, a helpful AI assistant. Respond in the same language the user uses.' },
          ...chatHistory
        ],
        stream: true,
        max_tokens: 1500,
        temperature: 0.7,
      })
    });

    typing.remove();
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let fullText = '';
    let aiBub    = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split('\n')) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') break;
        try {
          const delta = JSON.parse(data).choices?.[0]?.delta?.content;
          if (delta) {
            if (!aiBub) aiBub = addBubble('ai', '');
            fullText += delta;
            aiBub.innerHTML = renderMd(fullText);
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        } catch {}
      }
    }

    const reply = fullText || '(không có phản hồi)';
    if (!aiBub) aiBub = addBubble('ai', esc(reply));
    chatHistory.push({ role: 'assistant', content: reply });

    // Save assistant message
    fetch(`/api/chat/conversations/${currentConvId}/messages`, {
      method: 'POST', headers: authHeader(),
      body: JSON.stringify({ role: 'assistant', content: reply })
    });

    // Reload sidebar for updated title
    await loadConversations();

  } catch (err) {
    typing.remove();
    const errEl = document.createElement('div');
    errEl.className = 'err-msg';
    errEl.textContent = '⚠ Lỗi: ' + err.message;
    chatEl.appendChild(errEl);
    chatHistory.pop();
  }

  busy = false;
  btnSend.disabled = false;
  inp.focus();
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ── Helpers ───────────────────────────────────────────
function addBubble(role, html) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  const av  = document.createElement('div'); av.className = 'av';
  av.textContent = role === 'user' ? fullName.charAt(0).toUpperCase() : 'AI';
  const bub = document.createElement('div'); bub.className = 'bub';
  bub.innerHTML = html;
  wrap.appendChild(av); wrap.appendChild(bub);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bub;
}

function renderMd(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${esc(c.trim())}</code></pre>`);
  text = text.replace(/`([^`\n]+)`/g, (_,c) => `<code>${esc(c)}</code>`);
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function logout() {
  ['hc_token','hc_role','hc_fullName','hc_className'].forEach(k => localStorage.removeItem(k));
  location.href = '/login.html';
}

// ── Init ──────────────────────────────────────────────
loadConversations();
</script>
</body>
</html>
